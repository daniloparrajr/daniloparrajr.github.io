<header class="site-header" role="banner">

  <div class="container">
    <div class="row align-items-center">

      <div class="col site-header__logo">
        <p class="site-title"><a class="site-title__link" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a></p>
      </div>

      <div class="col site-header__nav">
        <nav class="site-nav">
          {% for item in site.data.navigation %}
            <a class="page-link {% if page.url == item.link %}page-link--active{% endif %}" href="{{ item.link }}" >{{ item.name }}</a>
          {% endfor %}
        </nav>
      </div>

      <div class="col site-header__cta">
        <a href="/contact" class="btn btn-primary rounded-pill">CONTACT ME</a>
      </div>
    </div>
  </div>

</header>
